# tufte — canonical variant (off-black ink)
# Creamy paper, off-black #111111 ink, a rare drop of vermillion.

# UI Colors (extended)
accent = "#a00000"
cursor = "#111111"

# Primary colors
foreground = "#111111"
background = "#fffff8"

# Selection colors
selection_foreground = "#111111"
selection_background = "#ffec99"

# Normal colors (ANSI 0-7)
# 7-tier luminance ramp (T1 light -> T7 dark) + vermillion accent on color1
color0 = "#cfcfca"   # T1 faint chrome (near bg)
color1 = "#a00000"   # vermillion — errors only
color2 = "#7c7c79"   # T2 comments
color3 = "#5d5d5b"   # T3 operators, punctuation
color4 = "#4a4a48"   # T4 strings, numbers
color5 = "#3c3c3b"   # T5 variables, properties
color6 = "#292928"   # T6 keywords, types
color7 = "#111111"   # T7 off-black foreground

# Bright colors (ANSI 8-15)
color8 = "#cfcfca"
color9 = "#a00000"
color10 = "#7c7c79"
color11 = "#5d5d5b"
color12 = "#4a4a48"
color13 = "#3c3c3b"
color14 = "#292928"
color15 = "#111111"
