color3 = "#b0b0a8"   # warm gray 2
color4 = "#909088"   # warm gray 3
color5 = "#707068"   # warm gray 4
color6 = "#505048"   # warm gray 5
color7 = "#111111"   # off-black foreground

# Bright colors (ANSI 8-15)
